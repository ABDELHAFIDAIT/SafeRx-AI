services:
  scraper:
    build:
      context: ./scraping
    container_name: saferxai_scraper
    profiles: [scraping]
    volumes:
      - ./data/raw:/app/data/raw
    command: python scraper_med_ma.py --output data/raw/all_drugs_med_ma.csv
    restart: "no"

  etl:
    build: { context: ./etl }
    profiles: [etl]
    command: ["python3", "transform_med_ma.py"]
    volumes:
      - ./data/raw:/app/data/raw
      - ./data/processed:/app/data/processed
    restart: "no"

  etl-load:
    build: { context: ./etl }
    profiles: [etl]
    command: ["python3", "load_med_ma.py"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data/processed:/app/data/processed
    restart: "no"
  
  etl-parse-thesaurus:
    build: { context: ./etl }
    profiles: [tools]
    command: [
      "python3", "parse_thesaurus_ansm.py",
      "--pdf", "/data/raw/thesaurus_ansm_2023.pdf",
      "--out", "/data/processed/interactions_ansm.csv",
      "--stats"
    ]
    volumes:
      - ./data:/data
    restart: "no"
  
  etl-load-interactions:
    build: { context: ./etl }
    profiles: [etl]
    command: ["python3", "load_interactions.py"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data/processed:/app/data/processed
    restart: "no"

  db:
    image: postgres:15
    container_name: saferxai_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer
    container_name: saferxai_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

  api:
    build: .
    container_name: saferxai_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - GIT_PYTHON_REFRESH=quiet
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    container_name: saferxai_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  postgres_data: